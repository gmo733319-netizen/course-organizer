<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Add New Course</h2>
            <form>
                <label>Course Name:</label>
                <input type="text" placeholder="Enter course name" required>
                
                <label>Instructor:</label>
                <input type="text" placeholder="Enter instructor name" required>
                
                <label>Credit Hours:</label>
                <input type="number" placeholder="Enter credit hours" required>
                
                <label>Notes:</label>
                <textarea rows="4" placeholder="Enter any additional notes"></textarea>
                
                <button type="submit">Save Course</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Personal Course Organizer</p>
    </footer>
</body>
</html>
